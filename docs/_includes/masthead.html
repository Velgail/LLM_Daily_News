<header class="masthead">
  <div class="masthead-inner">
    <a class="masthead-title" href="{{ '/' | relative_url }}">
      <span class="masthead-title-main">こたつLLM速報</span>
      <span class="masthead-title-sub">Kotatsu LLM Times</span>
    </a>
    <div class="masthead-meta">
      {% assign latest = site.posts.first %}
      {% if latest %}
        <span class="masthead-tagline">{{ latest.date | date: "%Y.%-m.%-d" }} 更新 ・ 全 {{ site.posts.size }} 号</span>
      {% else %}
        <span class="masthead-tagline">創刊準備中</span>
      {% endif %}
      <span class="masthead-badge">LIVE</span>
    </div>
  </div>
</header>
