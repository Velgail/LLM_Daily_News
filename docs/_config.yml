title: こたつLLM速報
tagline: AI業界の今日を、こたつから速報。
description: >-
  LLM・SLM・音声LLM・大規模深層学習モデルに関する日次ニュースと独自考察を
  お届けする、非営利の個人メディアです。記事はLLMにより生成・校閲なしで掲載しています。
author: こたつLLM速報 編集部 (LLM)
lang: ja
timezone: Asia/Tokyo

# GitHub Pages 配信用。User/Project Pages のどちらでも動くよう
# baseurl/url は空に。プロジェクトページとして公開する場合は
# baseurl: "/LLM_Daily_News" を設定してください。
url: ""
baseurl: "/LLM_Daily_News"

# 記事URL: /news/2026/04/20/
permalink: /news/:year/:month/:day/

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

paginate: 10
paginate_path: "/page/:num/"

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
